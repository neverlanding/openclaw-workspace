<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的8个搭子 - AI Agent团队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #0a0a0f;
        }
        
        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.3; }
        }
        
        /* 3D幻灯片容器 */
        .slideshow {
            width: 100vw;
            height: 100vh;
            position: relative;
            perspective: 1200px;
            z-index: 1;
        }
        
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            opacity: 0;
            transform: translateX(100%) rotateY(-30deg);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        
        .slide.active {
            opacity: 1;
            transform: translateX(0) rotateY(0deg);
            z-index: 10;
        }
        
        .slide.prev {
            transform: translateX(-100%) rotateY(30deg);
            opacity: 0.5;
        }
        
        /* 动画效果 */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide.active .slide-header,
        .slide.active .slide-body > * {
            animation: slideInUp 0.6s ease-out forwards;
        }
        
        .slide.active .slide-header { animation-delay: 0.1s; }
        .slide.active .info-section:nth-child(1) { animation-delay: 0.2s; }
        .slide.active .info-section:nth-child(2) { animation-delay: 0.3s; }
        .slide.active .info-section:nth-child(3) { animation-delay: 0.4s; }
        
        /* 封面页 - 霓虹效果 */
        .slide-cover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            position: relative;
            overflow: hidden;
        }
        
        .slide-cover::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .slide-cover h1 {
            font-size: 96px;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(102, 126, 234, 0.8),
                0 0 40px rgba(118, 75, 162, 0.8);
            position: relative;
            z-index: 2;
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        .slide-cover .subtitle {
            font-size: 36px;
            color: rgba(255,255,255,0.95);
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 2;
        }
        
        .slide-cover .author {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            position: relative;
            z-index: 2;
        }
        
        /* 内容页 - 玻璃态效果 */
        .slide-content {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(102, 126, 234, 0.1) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .slide-content:nth-child(odd) {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        .slide-header {
            display: flex;
            align-items: center;
            margin-bottom: 60px;
            opacity: 0;
        }
        
        .agent-icon {
            width: 120px;
            height: 120px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            margin-right: 40px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                0 0 20px rgba(255,255,255,0.2) inset;
            animation: pulse 3s ease-in-out infinite;
            transition: all 0.3s ease;
        }
        
        .agent-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .slide-header h2 {
            font-size: 64px;
            background: linear-gradient(135deg, #fff 0%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .slide-header .role {
            font-size: 24px;
            color: #a0aec0;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        
        .slide-body {
            max-width: 1000px;
            width: 100%;
        }
        
        .info-section {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            opacity: 0;
        }
        
        .info-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .info-section h3 {
            font-size: 24px;
            color: #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .info-section h3::before {
            content: '';
            width: 6px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 15px;
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
        
        .info-section p, .info-section li {
            font-size: 20px;
            color: #cbd5e0;
            line-height: 2;
            transition: all 0.2s ease;
        }
        
        .info-section li:hover {
            color: #fff;
            transform: translateX(5px);
        }
        
        .info-section ul {
            list-style: none;
            padding-left: 0;
        }
        
        .info-section li {
            padding-left: 30px;
            position: relative;
            margin-bottom: 12px;
        }
        
        .info-section li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 5px rgba(102, 126, 234, 0.8);
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .skill-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .skill-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .skill-tag:hover::before {
            left: 100%;
        }
        
        .skill-tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* 导航 - 玻璃态悬浮效果 */
        .nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 1000;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        .nav:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(-50%) scale(1.05);
        }
        
        .nav button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 24px;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .nav button:hover {
            background: rgba(102, 126, 234, 0.8);
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
        }
        
        .slide-counter {
            color: #fff;
            font-size: 18px;
            min-width: 100px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }
        
        /* 结束页 - 网格动画 */
        .slide-end {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 50%, #f093fb 100%);
            position: relative;
            overflow: hidden;
        }
        
        .slide-end::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0%
