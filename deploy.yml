name: Deploy OpenClaw 8-Agent Team

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inject secrets to config
        run: |
          cat > inject.py <> 'PYEOF'
          import json
          import os
          
          with open('configs/openclaw.template.json', 'r') as f:
              content = f.read()
          
          # 替换模板变量
          replacements = {
              '{{FEISHU_MAIN_APPSECRET}}': os.environ.get('FEISHU_MAIN_APPSECRET', ''),
              '{{FEISHU_PLANNER_APPSECRET}}': os.environ.get('FEISHU_PLANNER_APPSECRET', ''),
              '{{FEISHU_OFFICE_APPSECRET}}': os.environ.get('FEISHU_OFFICE_APPSECRET', ''),
              '{{FEISHU_WRITER_APPSECRET}}': os.environ.get('FEISHU_WRITER_APPSECRET', ''),
              '{{FEISHU_NEWS_APPSECRET}}': os.environ.get('FEISHU_NEWS_APPSECRET', ''),
              '{{FEISHU_READER_APPSECRET}}': os.environ.get('FEISHU_READER_APPSECRET', ''),
              '{{FEISHU_FINANCE_APPSECRET}}': os.environ.get('FEISHU_FINANCE_APPSECRET', ''),
              '{{FEISHU_CODER_APPSECRET}}': os.environ.get('FEISHU_CODER_APPSECRET', ''),
              '{{OPENCLAW_GATEWAY_TOKEN}}': os.environ.get('OPENCLAW_GATEWAY_TOKEN', ''),
              '{{KIMI_CODING_API_KEY}}': os.environ.get('KIMI_CODING_API_KEY', ''),
              '{{MOONSHOT_API_KEY}}': os.environ.get('MOONSHOT_API_KEY', ''),
              '{{NANO_BANANA_API_KEY}}': os.environ.get('NANO_BANANA_API_KEY', ''),
              '{{ALLOWED_USER}}': os.environ.get('ALLOWED_USER', '*'),
          }
          
          for key, value in replacements.items():
              content = content.replace(key, value)
          
          config = json.loads(content)
          
          with open('openclaw.json', 'w') as f:
              json.dump(config, f, indent=2)
          
          print('✅ Config generated successfully')
          PYEOF
          
          python3 inject.py
        env:
          FEISHU_MAIN_APPSECRET: ${{ secrets.FEISHU_MAIN_APPSECRET }}
          FEISHU_PLANNER_APPSECRET: ${{ secrets.FEISHU_PLANNER_APPSECRET }}
          FEISHU_OFFICE_APPSECRET: ${{ secrets.FEISHU_OFFICE_APPSECRET }}
          FEISHU_WRITER_APPSECRET: ${{ secrets.FEISHU_WRITER_APPSECRET }}
          FEISHU_NEWS_APPSECRET: ${{ secrets.FEISHU_NEWS_APPSECRET }}
          FEISHU_READER_APPSECRET: ${{ secrets.FEISHU_READER_APPSECRET }}
          FEISHU_FINANCE_APPSECRET: ${{ secrets.FEISHU_FINANCE_APPSECRET }}
          FEISHU_CODER_APPSECRET: ${{ secrets.FEISHU_CODER_APPSECRET }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          KIMI_CODING_API_KEY: ${{ secrets.KIMI_CODING_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          NANO_BANANA_API_KEY: ${{ secrets.NANO_BANANA_API_KEY }}
          ALLOWED_USER: ${{ secrets.ALLOWED_USER }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          DEPLOY_PORT="${{ secrets.DEPLOY_PORT || 22 }}"
          
          echo "🚀 部署到 $DEPLOY_HOST..."
          
          # 创建临时目录
          ssh -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST "mkdir -p /tmp/openclaw-deploy"
          
          # 复制配置文件
          scp -P $DEPLOY_PORT openclaw.json $DEPLOY_USER@$DEPLOY_HOST:/tmp/openclaw-deploy/
          
          # 复制 Agents
          scp -P $DEPLOY_PORT -r configs/agents $DEPLOY_USER@$DEPLOY_HOST:/tmp/openclaw-deploy/
          
          # 复制技能
          if [ -d "skills/local" ]; then
            scp -P $DEPLOY_PORT -r skills/local $DEPLOY_USER@$DEPLOY_HOST:/tmp/openclaw-deploy/skills/
          fi
          if [ -d "skills/agents" ]; then
            scp -P $DEPLOY_PORT -r skills/agents $DEPLOY_USER@$DEPLOY_HOST:/tmp/openclaw-deploy/skills/
          fi
          
          # 复制扩展
          if [ -d "extensions" ]; then
            scp -P $DEPLOY_PORT -r extensions $DEPLOY_USER@$DEPLOY_HOST:/tmp/openclaw-deploy/
          fi
          
          echo "✅ Files copied"

      - name: Install and restart service
        run: |
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          DEPLOY_PORT="${{ secrets.DEPLOY_PORT || 22 }}"
          
          ssh -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST << 'REMOTESCRIPT'
            set -e
            
            echo "🔧 安装配置..."
            
            # 创建目录
            mkdir -p ~/.openclaw/{agents,skills,extensions}
            mkdir -p ~/.agents/skills
            
            # 备份现有配置
            if [ -f ~/.openclaw/openclaw.json ]; then
              BACKUP_FILE="$HOME/.openclaw/openclaw.json.bak.$(date +%s)"
              cp ~/.openclaw/openclaw.json "$BACKUP_FILE"
              echo "💾 已备份原配置到: $BACKUP_FILE"
            fi
            
            # 复制新配置
            cp /tmp/openclaw-deploy/openclaw.json ~/.openclaw/
            
            # 复制 Agents
            if [ -d /tmp/openclaw-deploy/agents ]; then
              for agent in boss planner office writer news reader finance coder; do
                if [ -d "/tmp/openclaw-deploy/agents/$agent" ]; then
                  rm -rf "$HOME/.openclaw/agents/$agent" 2>/dev/null || true
                  cp -r "/tmp/openclaw-deploy/agents/$agent" "$HOME/.openclaw/agents/"
                  echo "  ✅ Agent: $agent"
                fi
              done
            fi
            
            # 复制技能
            if [ -d /tmp/openclaw-deploy/skills/local ]; then
              cp -r /tmp/openclaw-deploy/skills/local/* ~/.openclaw/skills/ 2>/dev/null || true
              echo "  ✅ 本地技能"
            fi
            if [ -d /tmp/openclaw-deploy/skills/agents ]; then
              cp -r /tmp/openclaw-deploy/skills/agents/* ~/.agents/skills/ 2>/dev/null || true
              echo "  ✅ Agents技能"
            fi
            
            # 复制扩展并安装依赖
            if [ -d /tmp/openclaw-deploy/extensions ]; then
              for ext in /tmp/openclaw-deploy/extensions/*/; do
                ext_name=$(basename "$ext")
                rm -rf "$HOME/.openclaw/extensions/$ext_name" 2>/dev/null || true
                cp -r "$ext" ~/.openclaw/extensions/
                
                if [ -f "$HOME/.openclaw/extensions/$ext_name/package.json" ]; then
                  echo "  📦 安装 $ext_name 依赖..."
                  (cd "$HOME/.openclaw/extensions/$ext_name" && npm install --silent) || true
                fi
              done
            fi
            
            # 检查 OpenClaw 是否安装
            if ! command -v openclaw &> /dev/null; then
              echo "⚠️  OpenClaw 未安装，尝试安装..."
              npm install -g openclaw || {
                echo "❌ OpenClaw 安装失败，请手动安装"
                exit 1
              }
            fi
            
            # 验证配置
            echo "🔍 验证配置..."
            openclaw config validate || {
              echo "❌ 配置验证失败"
              exit 1
            }
            
            # 重启服务
            echo "🔄 重启 Gateway..."
            openclaw gateway restart || openclaw gateway start
            
            # 清理
            rm -rf /tmp/openclaw-deploy
            
            echo "✅ 部署完成!"
          REMOTESCRIPT

      - name: Health check
        run: |
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          echo "⏳ 等待服务启动..."
          
          for i in {1..10}; do
            if curl -sf "http://$DEPLOY_HOST:18789/status" > /dev/null 2>&1; then
              echo "✅ 服务运行正常!"
              exit 0
            fi
            echo "  检查中... ($i/10)"
            sleep 3
          done
          
          echo "❌ 健康检查失败，请检查服务器日志"
          exit 1

      - name: Notify success
        if: success()
        run: |
          echo "🎉 OpenClaw 8-Agent 部署成功!"
          echo ""
          echo "📊 部署信息:"
          echo "  - 环境: ${{ github.event.inputs.environment || 'production' }}"
          echo "  - 服务器: ${{ secrets.DEPLOY_HOST }}"
          echo "  - 提交: ${{ github.sha }}"
          echo "  - 时间: $(date)"
